defaults:
  - _self_
  - data: mnli
  - student: roberta_base
  - teacher: roberta_large_mnli
  - optimizer: adamw
  - distill: hinton
  - grpo: default
  - kdrl: default
  - trrd: default
  - wandb: default
  - method: sft        # LAST so a method preset can override distill/grpo/kdrl/trrd via @package _global_

seed: 42
epochs: 3
grad_accum_steps: 2
max_grad_norm: 1.0

eval:
  every_n_steps: 500   # optimizer steps between mid-epoch evals (epoch-end always evals)
log:
  every_n_steps: 20    # optimizer steps between W&B train logs

# Run outputs (best.pt, hydra logs) go to /scratch, off the home quota and out of git.
logging:
  out_dir: /scratch/elsaad/distill_rl_runs

# run_name keeps parallel runs (the 4-experiment array) in separate dirs / W&B runs.
run_name: ${method_name}_seed${seed}

hydra:
  run:
    dir: ${logging.out_dir}/${run_name}/${now:%Y-%m-%d}_${now:%H-%M-%S}
  sweep:
    dir: ${logging.out_dir}/multirun/${now:%Y-%m-%d}_${now:%H-%M-%S}
    subdir: ${run_name}_${hydra.job.num}
