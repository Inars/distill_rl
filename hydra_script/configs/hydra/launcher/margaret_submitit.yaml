# @package hydra.launcher
# Optional submitit launcher for `--multirun` sweeps on the INRIA margaret cluster.
# The day-to-day path is slurm/run_all.slurm; this is for hydra-native sweeps.
_target_: hydra_plugins.hydra_submitit_launcher.submitit_launcher.SlurmLauncher
submitit_folder: "${hydra.sweep.dir}/.submitit/%j"
partition: gpu-best
gres: gpu:1
gpus_per_node: 1
nodes: 1
tasks_per_node: 1
cpus_per_task: 4
mem_gb: 24
timeout_min: 240
name: "${hydra.job.name}"
array_parallelism: 8
